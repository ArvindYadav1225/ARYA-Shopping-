<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Debit Card Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f1f5f9, #dbeafe);
        }

        .payment-card {
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cvv-info {
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card payment-card p-4">

                <!-- Header -->
                <div class="text-center mb-4">
                    <i class="bi bi-credit-card-2-front text-primary fs-1"></i>
                    <h3 class="fw-bold mt-2">Debit Card Payment</h3>
                    <p class="text-muted">Secure card transaction</p>
                </div>

                <!-- Order Summary -->
                <div class="border rounded p-3 mb-4">
                    <div class="d-flex justify-content-between">
                        <span>Order Amount</span>
                        <strong>₹2,199</strong>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span>Delivery</span>
                        <span class="text-success">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fs-5">
                        <strong>Total Payable</strong>
                        <strong class="text-primary">₹2,199</strong>
                    </div>
                </div>

                <!-- Debit Card Form -->
                <form th:action="@{/pay/debit-card}" method="post">

                    <!-- Card Number -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Card Number</label>
                        <input type="text" class="form-control"
                               name="cardNo"
                               placeholder="1234 5678 9012 3456"
                               maxlength="19"
                               oninput="formatCard(this)"
                               required>
                    </div>

                    <!-- Card Holder -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Card Holder Name</label>
                        <input type="text" class="form-control"
                               name="cardName"
                               placeholder="Name on card"
                               required>
                    </div>

                    <!-- Card Type -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Card Type</label>
                        <select class="form-select" name="cardType" required>
                            <option value="">-- Select Card Type --</option>
                            <option value="VISA">Visa</option>
                            <option value="MASTERCARD">MasterCard</option>
                            <option value="RUPAY">RuPay</option>
                        </select>
                    </div>

                    <!-- Expiry + CVV -->
                    <div class="row mb-4">
                        <div class="col-4">
                            <label class="form-label fw-semibold">MM</label>
                            <input type="number" class="form-control"
                                   name="expMonth" min="1" max="12" placeholder="MM" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label fw-semibold">YY</label>
                            <input type="number" class="form-control"
                                   name="expYear" min="24" max="40" placeholder="YY" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label fw-semibold">
                                CVV <i class="bi bi-info-circle cvv-info"
                                        title="3-digit code at back of card"></i>
                            </label>
                            <input type="password" class="form-control"
                                   name="cvv" maxlength="3" placeholder="***" required>
                        </div>
                    </div>

                    <!-- Pay Button -->
                    <button type="submit" class="btn btn-primary w-100 py-2 fs-5">
                        <i class="bi bi-lock-fill"></i> Pay ₹2,199 Securely
                    </button>

                </form>

                <!-- Footer -->
                <div class="text-center mt-3 text-muted small">
                    <i class="bi bi-shield-check text-success"></i>
                    Your card details are encrypted & protected
                </div>

            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function formatCard(input) {
        let value = input.value.replace(/\D/g, '');
        value = value.replace(/(.{4})/g, '$1 ').trim();
        input.value = value;
    }
</script>

</body>
</html>
