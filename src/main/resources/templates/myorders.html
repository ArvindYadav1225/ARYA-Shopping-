<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<title>Yadav Shopping Application</title>

<style>


/* Input */

body{background:#eef3f7;



}
  

    .tracking {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        margin: 50px -90px;
    }

    /* thin connecting line */
    .tracking::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 0;
        width: 100%;
        height: 2px;
        background: #ccc;
        z-index: 1;
    }

    .step {
        position: relative;
        z-index: 2;
        text-align: center;
        width: 100%;
    }

    .circle {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ccc;
        color:white;
        margin: auto;
        align-items:center;
        justify-content:center;
    }

    /* blinking green first step */
    .blinking {
        background: #28a745;
        animation: blink 1s infinite;
    }

    /* completed steps */
    .completed .circle {
        background: #28a745;
    }

    @keyframes blink {
        0%   { box-shadow: 0 0 5px #28a745; }
        50%  { box-shadow: 0 0 15px #28a745; }
        100% { box-shadow: 0 0 5px #28a745; }
    }
    
    .completed{
       color:green;

       
    }

</style>
</head>

<body>

<!-- HEADER -->
<div class="container-fluid bg-light">
<div class="row align-items-center">

<img th:src="@{/images/yadavshoppinglogo.png}" style="height:60px;width:160px;background:transparent" class="bg-light ">
<div class="col d-flex justify-content-center">
    <form th:action="@{/search}" method="get" class="w-100 d-flex justify-content-center">
        
        <div class="search-wrapper position-relative d-flex align-items-center w-50 " style="margin-left:55%">

            <!-- Search Icon -->
            <i class="bi bi-search search-icon"></i>

            <!-- Input -->
            <input type="search"
                   id="searchInput"
                   class="form-control search-input"
                   placeholder="Search"
                   name="searchValue"
                   autocomplete="off">

            <!-- Search Button -->
            <button type="submit" class="btn btn-primary ms-2">
                Search
            </button>

            <!-- Dropdown -->
            <ul id="searchDropdown" class="search-dropdown d-none"></ul>

        </div>
    </form>
</div>

<div class="col d-flex justify-content-center">

            <!-- Search Icon -->
           
       
            
        
</div>

  


<div class="col-auto">
<form th:if="${session.mobile==null}" th:action="@{/login}" method="get">
<button class="btn bg-light"><i class="bi bi-person-circle"></i> Login</button>
</form>

<div th:unless="${session.mobile==null}" class="position-relative">
<a th:href="@{/cartpage}" ><i class="bi bi-cart3 fs-3"></i></a>
<span class="badge bg-danger position-absolute top-0 start-100 translate-middle" th:if="${session.user!=null}" th:text="${#lists.size(session.user.cartItems)}"></span>
<span class="badge bg-danger position-absolute top-0 start-100 translate-middle" th:unless="${session.user!=null}" >0</span>

</div>
</div>

<div class="col-auto" th:if="${session.mobile!=null}">
<i class="bi bi-bell-fill fs-4"></i>
</div>

<div class="col-auto">
<form th:if="${session.mobile==null}" th:action="@{/signup}" method="get">
<button class="btn bg-light "><i class="bi bi-person-circle"></i> Signup</button>
</form>


</div>

</div>
</div>

   
  
 <div  style="margin:3% 20% 0  ;padding:2%" class="bg-light">
<div th:each="entry : ${products}"
     th:if="${entry != null}"
     class="bg-light row">
     <div class="row"></div>
        <div th:each="prodkey:${entry.key}">
            <div class="col-1">
   <img class="img-fluid"
         th:src="@{/images/{img}.jpg(img=${prodkey.value.image})}"
         style="height:50px;width:60px;">
     </div>
     <div class="col-10">
     
     <span style="font-family: Inter;font-size: 16px;font-weight: 900" th:text="${prodkey.value.name}"></span><br>
    
     <span style="font-family: Inter;font-size: 18px;font-weight: 1000"th:text="'₹' +${prodkey.value.price}"></span>
     <span  class="text-muted text-decoration-line-through" style="font-family: Inter;font-size: 15px;font-weight: 1200" th:text="'₹' +${prodkey.value.oldprice}"></span>
     <span style="font-family: Inter;font-size: 18px;font-weight: 1000;color:green" th:text="${prodkey.value.discount}"></span><br>
        </div>
     <div th:each="inner:${entry.value}">
     <span style="color:red;font-family: Inter;font-size: 15px;font-weight: 1200" th:text="'Ordered date : ' + ${inner.key}"></span>
     
      <span style="margin-left:40%;color:green;font-family: Inter;font-size: 15px;font-weight: 1200" th:text="' Expected Delevery Date:'+${#temporals.format(inner.key.plusDays(7),'dd-MM-yyyy')}"> </span><br>
 <div class="progress">
  <div class="progress-bar bg-success" role="progressbar"  aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" th:style="'width:'+${100/8*(8-inner.value)}+'%'"></div>
</div>

    <div style="margin-top:-40px"> 
<div class="tracking" >
    <div style="color:green;font-family: Inter;font-size: 13px;font-weight: 1000;" class="step active">
        <div  th:style="${inner.value<8}?'background:green;'" class="circle"><i class="bi bi-check-lg " th:if="${inner.value<8}"></i></div> Confirmed Order
    </div>
   <div class="step active"
     th:style="
        ${inner.value == 7} ? 
        'color:orange;font-family:Inter;font-size:14px;font-weight:1000;;' :
        (${inner.value < 7} ? 
            'color:green;font-family:Inter;font-size:13px;font-weight:1000;' :
            'color:black;font-family:Inter;font-size:13px;font-weight:1000;'
        )
     ">   <div  th:style="${inner.value<7}?'background-color:green'" class="circle" th:classappend="(${inner.value==7}?'blinking':'')+(${inner.value<7}?'completed':'')+(${inner.value<7}?'active':'')"><i class="bi bi-check-lg " th:if="${inner.value<7}"></i></div> Order Shippted
    </div>

    <div class="step active"
     th:style="
        ${inner.value == 6} ? 
        'color:orange;font-family:Inter;font-size:14px;font-weight:1000;' :
        (${inner.value < 6} ? 
            'color:green;font-family:Inter;font-size:13px;font-weight:1000;' :
            'color:black;font-family:Inter;font-size:13px;font-weight:1000;'
        )
     ">     <div th:style="${inner.value<6}?'background-color:green;'"  class="circle" th:classappend="(${inner.value==6}?'blinking':'')+(${inner.value<6}?'completed':'')+(${inner.value<6}?'active':'')"> <i class="bi bi-check-lg " th:if="${inner.value<6}"></i></div> Rajasrhan
    </div>

   <div class="step active"
     th:style="
        ${inner.value == 5} ? 
        'color:orange;font-family:Inter;font-size:14px;font-weight:1000;' :
        (${inner.value < 5} ? 
            'color:green;font-family:Inter;font-size:13px;font-weight:1000;' :
            'color:black;font-family:Inter;font-size:13px;font-weight:1000;'
        )
     ">  <div  th:style="${inner.value<5}?'background-color:green;'" class="circle"th:classappend="(${inner.value==5}?'blinking':'')+(${inner.value<5}?'completed':'')+(${inner.value<5}?'active':'')"><i class="bi bi-check-lg" th:if="${inner.value<5}"></i></div>New Delhi
    </div>

    <div class="step active"
     th:style="
        ${inner.value == 4} ? 
        'color:orange;font-family:Inter;font-size:14px;font-weight:1000;' :
        (${inner.value < 4} ? 
            'color:green;font-family:Inter;font-size:13px;font-weight:1000;' :
            'color:black;font-family:Inter;font-size:13px;font-weight:1000;'
        )
     ">  <div th:style="${inner.value<4}?'background-color:green;'" class="circle" th:classappend="(${inner.value==4}?'blinking':'')+(${inner.value<4}?'completed':'')+(${inner.value<4}?'active':'')"><i class="bi bi-check-lg" th:if="${inner.value<4}"></i></div>Lucknow
    </div>

   <div class="step active"
     th:style="
        ${inner.value == 3} ? 
        'color:orange;font-family:Inter;font-size:14px;font-weight:1000;' :
        (${inner.value < 3} ? 
            'color:green;font-family:Inter;font-size:13px;font-weight:1000;' :
            'color:black;font-family:Inter;font-size:13px;font-weight:1000;'
        )
     ">  <div th:style="${inner.value<3}?'background-color:green;'" class="circle" th:classappend="(${inner.value==3}?'blinking':'')+(${inner.value<3}?'completed':'')+(${inner.value<3}?'active':'')"><i class="bi bi-check-lg" th:if="${inner.value<3}"></i></div>Gorakhpur
    </div>

    <div class="step active"
     th:style="
        ${inner.value == 2} ? 
        'color:orange;font-family:Inter;font-size:14px;font-weight:1000;' :
        (${inner.value < 2} ? 
            'color:green;font-family:Inter;font-size:13px;font-weight:1000;' :
            'color:black;font-family:Inter;font-size:13px;font-weight:1000;'
        )
     "> <div  th:style="${inner.value<2}?'background-color:green;'" class="circle" th:classappend="(${inner.value==2}?'blinking':'')+(${inner.value<2}?'completed':'')+(${inner.value<2}?'active':'')"><i class="bi bi-check-lg " th:if="${inner.value<2}"></i></div>Nautanwa
    </div>
   <div class="step active"
     th:style="
        ${inner.value == 1} ? 
        'color:orange;font-family:Inter;font-size:14px;font-weight:1000;' :
        (${inner.value < 1} ? 
            'color:green;font-family:Inter;font-size:13px;font-weight:1000;' :
            'color:black;font-family:Inter;font-size:13px;font-weight:1000;'
        )
     "> <div th:style="${inner.value<1}?'background-color:green;'"  class="circle" th:classappend="(${inner.value==1}?'blinking':'')+(${inner.value<1}?'completed':'')+(${inner.value<1}?'active':'')"><i class="bi bi-check-lg text-light" th:if="${inner.value<1}"></i></div> Out For Delevery
        
    </div>
    
    <div class="step" th:style="${inner.value<=0}?'color:red;font-family: Inter;font-size: 13px;font-weight: 1000;':'font-family: Inter;font-size: 13px;font-weight: 1000;'" >
        <div th:style="${inner.value<1}?'background-color:red;'"  class="circle" th:classappend="${inner.value<=0}?'completed':''"><i class="bi bi-check-lg text-light" th:if="${inner.value<2}"></i></div> Order Delevered
        
    </div>
    
</div>
 <div style="margin-left:23%;margin-top:-50px;color:red; font-family:Inter;font-size: 15px;font-weight: 1200" th:text="'Expected Your Ordered is Delevered in just :' + ${inner.value}+' Days'"></div><br><br>
   
</div>

     
      </div> 
     </div>
     
     </div>
 </div>


        
   

      
    





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

window.history.pushState(null, null, window.location.href);

window.onpopstate = function () {
    window.location.href = "/home";
};
</script>
</body>
</html>
