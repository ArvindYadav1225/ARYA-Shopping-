<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yadav Shopping</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #eee;
        }
    </style>
</head>
<body>

<section class="vh-100">
  <div class="container h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-lg-12 col-xl-11">
        <div class="card text-black" style="border-radius: 25px;">
          <div class="card-body p-md-5">
            <div class="row justify-content-center">

              <!-- FORM COLUMN -->
              <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">

                <p class="text-center h1 fw-bold mb-5 mt-4">Login</p>

                <form th:action="@{/submitLogin}" method="post">

                  
          
                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-envelope fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="Number" class="form-control" placeholder="Your Mobile No."  name="mobile"/>
                      <span th:if="${invalidnumber!=null}" th:text="${invalidnumber}" style="color:red"></span>
                    </div>
                  </div>

                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-lock fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="password" class="form-control" placeholder="Password" name="password" />
                      <span th:if="${invalidpassword!=null}" th:text="${invalidpassword}"></span>
                    </div>
                  </div>

                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-key fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="password" class="form-control" placeholder="Repeat your password" name="cpassword"/>
                      <span th:if="${mismatchpassword !=null}" th:text="${mismatchpassword}+'dswdw"></span>
                    </div>
                  </div>
                       
                  <div class="d-flex justify-content-center mb-3">
                    <button type="submit" class="btn btn-primary " style="width:100%;font-family:Inter;font-size:18px;font-weight:1000">
                      Login
                    </button>
                    
                  </div>
                        <span style="margin-left:50%;"><a th:href="@{/forgotePassword}" >forgot password</a></span>
                </form>
              </div>

              <!-- IMAGE COLUMN -->
              <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                     class="img-fluid" alt="Signup Image">
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
window.history.pushState(null, null, window.location.href);

window.onpopstate = function () {
    window.location.href = "/home";
};
</script>
</body>
</html>
