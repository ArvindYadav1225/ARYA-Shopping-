<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
}

.card{
width:420px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
padding:30px;
}

.logo{
font-size:50px;
color:#0d6efd;
}

.timer{
font-weight:bold;
color:red;
}

</style>

</head>
<body>

<div class="card text-center">

<div class="mb-3">
<i class="bi bi-shield-lock-fill logo"></i>
<h4 class="mt-2">Forgot Password</h4>
<p class="text-muted" th:style="${otp!=null}?'display:none':''">Enter your Gmail to receive OTP</p>
</div>

<!-- Email Input -->
<form th:action="@{/OtpGenerate}" method="post">

<div id="emailSection">

<div class="input-group mb-3" th:style="${otp!=null}?'display:none':''">

<span class="input-group-text" >
<i class="bi bi-envelope-fill"></i>
</span>

<input type="email" id="email" class="form-control" placeholder="Enter Gmail" name="gmail" >
<span style="color:red"></span>

</div>

<button class="btn btn-primary w-100" onclick="sendOTP()" th:style="${otp!=null}?'display:none':''">
<i class="bi bi-send"></i> Send OTP
</button>

</div>
</form>
<!-- OTP Section -->
<form th:action="@{/OtpVerification}" method="post">
<div id="otpSection" th:style="${otp==null}?'display:none':''">

<div class="input-group mt-3">

<span class="input-group-text">
<i class="bi bi-key-fill"></i>
</span>

<input type="text" id="otp" class="form-control" placeholder="Enter OTP" name="otp">

 <input type="hidden" name="gmail" th:value="${gmail}">
</div>

<span  th:style="${invalidotp==null}?'display:none':'color:red'"> Invalid OTP</span>
<div class="mt-2 timer">
OTP expires in <span id="time">60</span> seconds
</div>

<div class="d-flex gap-2 mt-3">

<button class="btn btn-success w-50">
<i class="bi bi-check-circle"></i> Submit
</button>

<button class="btn btn-warning w-50" formaction="/OtpGenerate">
<i class="bi bi-arrow-repeat"></i> Resend
</button>

</div>

</div>

</form>
</div>



</body>
<script >
//Start value
let time = 120;

// Select the div (change #timer to your div id)
let timerDiv = document.getElementById("time");

// Set initial value
timerDiv.innerText = time;

// Decrement every second
let countdown = setInterval(function () {
    time--;
    timerDiv.innerText = time;

    if (time <= 0) {
        clearInterval(countdown);
    }
}, 1000);
</script>
<script>
window.history.pushState(null, null, window.location.href);

window.onpopstate = function () {
    window.location.href = "/login";
};
</script>
</html>
