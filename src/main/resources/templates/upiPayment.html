<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>UPI Payment</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body{
        background: linear-gradient(135deg,#f8f9fa,#e3f2fd);
    }
    .payment-card{
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        animation: fadeIn 0.6s ease-in-out;
    }
    @keyframes fadeIn{
        from{opacity:0; transform: translateY(20px);}
        to{opacity:1; transform: translateY(0);}
    }
    .upi-app{
        cursor:pointer;
        border:1px solid #dee2e6;
        border-radius:12px;
        transition:0.3s;
    }
    .upi-app:hover{
        background:#e7f1ff;
        border-color:#0d6efd;
        transform:scale(1.05);
    }
</style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card payment-card p-4">

                <!-- Header -->
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-primary fs-1"></i>
                    <h3 class="mt-2 fw-bold">UPI Payment</h3>
                    <p class="text-muted">100% Secure Transaction</p>
                </div>

                <!-- Order Summary -->
                <div class="border rounded p-3 mb-4">
                    <div class="d-flex justify-content-between">
                        <span>Order Amount</span>
                        <strong>₹1,499</strong>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span>Delivery</span>
                        <span class="text-success">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fs-5">
                        <strong>Total Payable</strong>
                        <strong class="text-primary">₹1,499</strong>
                    </div>
                </div>

                <!-- UPI ID -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Enter UPI ID
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-primary text-white">
                            <i class="bi bi-at"></i>
                        </span>
                        <input type="text" class="form-control" 
                               placeholder="example@upi" required>
                    </div>
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i> Eg: mobilenumber@paytm
                    </small>
                </div>

                <!-- UPI Apps -->
                <label class="fw-semibold mb-2">Or Pay Using</label>
                <div class="row g-3 mb-4">

                    <div class="col-4">
                        <div class="upi-app text-center p-2">
                         <img th:src="@{images/gpag.jpg}" 
                                  height="50" width="100">
                            
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="upi-app text-center p-2">
                         <img th:src="@{images/phonepay.jpg}" 
                                 height="50" width="100">
                            
                        </div>
                    </div>

                    <div class="col-4">
                        <div class="upi-app text-center p-2">
                            <img th:src="@{images/paytm.png}" 
                                 height="50" width="100">
                           
                        </div>
                    </div>

                </div>

                <!-- Pay Button -->
                <button class="btn btn-primary w-100 py-2 fs-5">
                    <i class="bi bi-lock-fill"></i> Pay ₹1,499 Securely
                </button>

                <!-- Footer -->
                <div class="text-center mt-3 text-muted small">
                    <i class="bi bi-shield-check text-success"></i>
                    Payments are protected by UPI & Bank-grade security
                </div>

            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
