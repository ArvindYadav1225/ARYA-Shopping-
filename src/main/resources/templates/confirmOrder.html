<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Confirmed</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Automatically redirect to home after 4 seconds -->
    <meta http-equiv="refresh" content="4 url=/home">

    <style>
        body {
            background: #f4f7fa;
        }

        .success-container {
            margin-top: 80px;
            text-align: center;
        }

        .success-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #4BB543;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pop 0.5s ease-out, glow 1.5s infinite;
        }

        .success-circle i {
            font-size: 70px;
            color: white;
            animation: tick 0.5s ease-in-out 0.3s forwards;
            opacity: 0;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes tick {
            0% { opacity: 0; transform: scale(0.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px #4BB543; }
            50% { box-shadow: 0 0 20px #4BB543; }
            100% { box-shadow: 0 0 5px #4BB543; }
        }

        .success-text {
            margin-top: 25px;
            animation: slide-in 0.6s ease-out;
        }

        @keyframes slide-in {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container success-container">
    <div class="success-circle">
        <i class="bi bi-check-lg"></i>
    </div>

    <h2 class="success-text text-success">Order Confirmed !</h2>
    <p class="text-muted">Redirecting to home page...</p>
</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</body>
</html>
