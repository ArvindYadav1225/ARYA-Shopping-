<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #eee;
        }
    </style>
</head>
<body>

<section class="vh-100">
  <div class="container h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-lg-12 col-xl-11">
        <div class="card text-black" style="border-radius: 25px;">
          <div class="card-body p-md-5">
            <div class="row justify-content-center">

              <!-- FORM COLUMN -->
              <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">

                <p class="text-center h1 fw-bold mb-5 mt-4">Sign up</p>

                <form th:action="@{/submitSignup}" method="post" th:object="${user}">

                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-user fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="text" class="form-control" th:field="*{name}" placeholder="Your Name" name="name" />
                      <span style="color:red;font-family: Inter;font-size: 13px;font-weight: 500;" th:errors="*{name}"></span>
                    </div>
                  </div>

                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-envelope fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="text" class="form-control" th:field="*{mobile}" placeholder="Your Mobile No."  name="mobile"/>
                      <span style="color:red;font-family: Inter;font-size: 13px;font-weight: 500;" th:errors="*{mobile}"></span>
                    </div>
                  </div>
                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-envelope fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="text" class="form-control" th:field="*{gmail}" placeholder=" Enter Your Email Id. abcd@gmail.com"  name="gmail"/>
                       <span style="color:red;font-family: Inter;font-size: 13px;font-weight: 500;" th:errors="*{gmail}"></span>
                    </div>
                  </div>

                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-lock fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="password" class="form-control" th:field="*{password}" placeholder=" Set Password" name="password" />
                       <span th:if="${#fields.hasErrors('password')}" th:text="${#fields.errors('password')[0]}" style="color:red;font-family: Inter;font-size: 13px;font-weight: 500;"></span>
                    </div>
                  </div>

                  <div class="d-flex align-items-center mb-4">
                    <i class="fas fa-key fa-lg me-3"></i>
                    <div class="form-outline flex-fill mb-0">
                      <input type="password" class="form-control" placeholder="Repeat your password" name="cpass"/>
                      <span th:if="${#fields.hasGlobalErrors()}" th:text="${#fields.globalErrors[0]}" style="color:red;font-family: Inter;font-size: 13px;font-weight: 500;"></span>
                    </div>
                  </div>

                  <div class="form-check d-flex justify-content-center mb-4">
                    <input class="form-check-input me-2" type="checkbox" />
                    <label class="form-check-label">
                      I agree all statements in <a href="#">Terms of service</a>
                    </label>
                  </div>

                  <div class="d-flex justify-content-center mb-3">
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
                      Register
                    </button>
                    
                  </div>
                  <span style="margin-left:60%"><a th:href="@{/login}">already registered</a></span>

                </form>
              </div>

              <!-- IMAGE COLUMN -->
              <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                     class="img-fluid" alt="Signup Image">
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
window.history.pushState(null, null, window.location.href);

window.onpopstate = function () {
    window.location.href = "/home";
};
</script>
</body>
</html>
